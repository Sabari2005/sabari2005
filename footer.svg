<svg viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Footer">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&amp;family=Fira+Code:wght@400;600&amp;display=swap');
      .title { font-family: 'Rajdhani', sans-serif; font-weight: 700; fill: #ffffff; letter-spacing: 6px; font-size: 20px;}
      .data { font-family: 'Fira Code', monospace; font-weight: 400; fill: #38bdf8; font-size: 11px; }
      .accent { fill: #f59e0b; }
      .glow { filter: drop-shadow(0 0 6px rgba(56, 189, 248, 0.6)); }
      .glow-amber { filter: drop-shadow(0 0 6px rgba(245, 158, 11, 0.6)); }
    </style>
    <linearGradient id="ftLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#38bdf8" stop-opacity="0.8"/>
      <stop offset="70%"  stop-color="#38bdf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Changed background to transparent/none to blend perfectly into github -->
  <rect width="1200" height="120" fill="none"/>

  <!-- Top technical border -->
  <line x1="0" y1="2" x2="1200" y2="2" stroke="url(#ftLine)" stroke-width="1.5" />
  <rect x="580" y="0" width="40" height="4" fill="#f59e0b" class="glow-amber"/>

  <!-- Side UI elements -->
  <path d="M 50 80 L 40 80 L 30 70 L 30 30 L 40 20 L 50 20" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.6" />
  <path d="M 1150 80 L 1160 80 L 1170 70 L 1170 30 L 1160 20 L 1150 20" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.6" />

  <!-- Footer text -->
  <text x="600" y="45" text-anchor="middle" class="title glow">
    SABARI VADIVELAN
  </text>
  <text x="600" y="70" text-anchor="middle" class="data" fill="#8b949e">
    [ AI ENGINEER &amp; AGENTIC SYSTEMS ARCHITECT ]
  </text>
  <text x="600" y="90" text-anchor="middle" class="data accent">
    SYS_ID: 110-093 :: CONNECTION SECURE
  </text>
</svg>
