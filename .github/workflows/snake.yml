# ──────────────────────────────────────────────────────────────────
# GitHub Contribution Snake Animation
#
# Generates a snake animation from your contribution graph.
# Output SVGs are pushed to the `output` branch.
#
# Usage:
#   1. Ensure your repo has Actions enabled (Settings > Actions)
#   2. Run this workflow manually once (Actions > Generate Snake > Run workflow)
#   3. It will also auto-run daily at midnight UTC
#
# The generated files will be at:
#   https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_USERNAME/output/github-contribution-grid-snake.svg
#   https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_USERNAME/output/github-contribution-grid-snake-dark.svg
# ──────────────────────────────────────────────────────────────────

name: Generate Contribution Snake

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: "0 0 * * *"

  # Allows manual triggering from the Actions tab
  workflow_dispatch:

  # Also runs on push to main (so it updates when you update README)
  push:
    branches:
      - main

jobs:
  generate:
    name: Generate Snake SVG
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push snake SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "chore(snake): update contribution snake [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
