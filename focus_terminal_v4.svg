<svg viewBox="0 0 420 390" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            text { font-family: 'JetBrains Mono', Consolas, 'Courier New', monospace; font-size: 14px; }
            .prompt { fill: #f59e0b; font-weight: 600; }
            .cmd { fill: #ffffff; font-weight: 600; }
            .key { fill: #38bdf8; }
            .text { fill: #c9d1d9; }
            .string { fill: #a5d6ff; }
            
            .window { fill: #0d1117; stroke: #30363d; stroke-width: 1.5; rx: 8px; }
            .header-bar { fill: #161b22; rx: 8px; }
            .dot-red { fill: #ff5f56; }
            .dot-yellow { fill: #ffbd2e; }
            .dot-green { fill: #27c93f; }
            .title { fill: #8b949e; font-size: 12px; font-family: sans-serif; }
            
            .cursor { fill: #c9d1d9; animation: blink 1s step-end infinite; }
            @keyframes blink { 50% { opacity: 0; } }
        </style>
        <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
            <line x1="0" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="1"/>
        </pattern>
    </defs>

    <rect x="2" y="2" width="416" height="386" class="window" />
    
    <path d="M 2 10 Q 2 2 10 2 L 410 2 Q 418 2 418 10 L 418 30 L 2 30 Z" class="header-bar" />
    <circle cx="20" cy="16" r="6" class="dot-red" />
    <circle cx="40" cy="16" r="6" class="dot-yellow" />
    <circle cx="60" cy="16" r="6" class="dot-green" />
    <text x="210.0" y="20" text-anchor="middle" class="title">current_focus.py - bash</text>

    <rect x="2" y="30" width="416" height="358" fill="url(#scanlines)" opacity="0.03" pointer-events="none" />

    <g transform="translate(10, 10)">
        <text x="20" y="60" class="prompt">sabari@ai-core:~$ </text><text x="170" y="60" class="cmd">python current_focus.py</text><text x="20" y="90" class="text">current_focus = [</text><text x="40" y="114" class="string">  "Small Language Models",</text><text x="40" y="138" class="string">  "Large Language Models",</text><text x="40" y="162" class="string">  "Agentic AI Systems",</text><text x="40" y="186" class="string">  "Retrieval-Augmented Generation",</text><text x="40" y="210" class="string">  "AI Infrastructure &amp; MLOps",</text><text x="40" y="234" class="string">  "Computer Vision",</text><text x="40" y="258" class="string">  "Full-Stack Web Development",</text><text x="40" y="282" class="string">  "Cybersecurity AI",</text><text x="40" y="306" class="string">  "Inference Optimization",</text><text x="20" y="330" class="text">]</text><rect x="20" y="354" width="10" height="18" class="cursor" />
    </g>
</svg>