<svg viewBox="0 0 160 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&amp;display=swap');
      .text { font-family: 'Rajdhani', sans-serif; font-size: 13px; fill: #e2e8f0; letter-spacing: 2px; }
      .bg { fill: #050b14; }
      .line { stroke: #38bdf8; stroke-width: 1; fill: none; opacity: 0.3; }
      .accent { stroke: #38bdf8; stroke-width: 1.5; fill: none; }
      .dot { fill: #f59e0b; animation: pulse 2.2s infinite; }
      @keyframes pulse { 
        0%, 100% { opacity: 0.4; r: 1.5; } 
        50% { opacity: 1; r: 2.5; filter: drop-shadow(0 0 4px #f59e0b); } 
      }
      .slide { animation: slideIn 3s infinite linear; }
      @keyframes slideIn {
        0% { stroke-dashoffset: 20; opacity: 0; }
        50% { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 0; }
      }
    </style>
  </defs>
  
  <rect x="0" y="0" width="160" height="40" class="bg" />
  <rect x="2" y="2" width="156" height="36" class="line" />
  
  <path d="M 2 10 L 2 2 L 10 2" class="accent" />
  <path d="M 158 30 L 158 38 L 150 38" class="accent" />
  
  <line x1="2" y1="38" x2="30" y2="38" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="10 10" class="slide" />
  
  <g transform="translate(15, 11)" fill="#38bdf8">
    <path d="M3 0a3 3 0 1 1 0 6 3 3 0 0 1 0-6zM1 8h4v12h-4V8zm7 0h3.8v1.6h.1c.5-1 1.9-2 3.8-2 4.1 0 4.8 2.7 4.8 6.2v6.2h-4v-5.6c0-1.3 0-3-1.8-3-1.9 0-2.2 1.5-2.2 2.9v5.7h-4V8z"/>
  </g>
  
  <text x="38" y="25" class="text">LINKEDIN</text>
  
  <circle cx="145" cy="20" r="1.5" class="dot" />
</svg>
